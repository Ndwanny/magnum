name: magnum_security
description: Magnum Security - Professional Security Services Platform for Lusaka, Zambia
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  provider: ^6.1.1
  fl_chart: ^0.66.2
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  # Supabase — backend, auth, realtime, storage
  supabase_flutter: ^2.8.4
  # HTTP client for Lenco/Broadpay payment gateway
  http: ^1.2.2
  # Environment variables from .env file
  flutter_dotenv: ^5.2.1
  # URL launcher (for payment redirects, WhatsApp links)
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
