name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Remove pre-installed Flutter
        run: sudo rm -rf /opt/hostedtoolcache/flutter/

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: stable
          cache: false

      - name: Verify Flutter version
        run: |
          which flutter
          flutter --version
          grep -n "cardTheme\|CardTheme" lib/theme/app_theme.dart || echo "No CardTheme found - correct"

      - name: Install dependencies
        run: flutter pub get

      - name: Create .env file from secrets
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> .env
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> .env
          echo "LENCO_API_KEY=${{ secrets.LENCO_API_KEY }}" >> .env
          echo "LENCO_MERCHANT_ID=${{ secrets.LENCO_MERCHANT_ID }}" >> .env
          echo "LENCO_BASE_URL=${{ secrets.LENCO_BASE_URL }}" >> .env
          echo "LENCO_WEBHOOK_SECRET=${{ secrets.LENCO_WEBHOOK_SECRET }}" >> .env
          echo "APP_URL=${{ secrets.APP_URL }}" >> .env

      - name: Build Flutter Web
        run: flutter build web --release --dart-define-from-file=.env

      - name: Copy _redirects and _headers to build output
        run: |
          cp web/_redirects build/web/_redirects
          cp web/_headers   build/web/_headers

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages project create magnum --production-branch=main || true
          DEPLOY_OUTPUT=$(npx wrangler pages deploy build/web --project-name=magnum --branch=${{ github.ref_name }} --commit-dirty=true --json 2>/dev/null || npx wrangler pages deploy build/web --project-name=magnum --branch=${{ github.ref_name }} --commit-dirty=true)
          DEPLOYMENT_ID=$(echo "$DEPLOY_OUTPUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('id',''))" 2>/dev/null || true)
          if [ -n "$DEPLOYMENT_ID" ] && [ "${{ github.ref_name }}" = "main" ]; then
            curl -s -X PATCH "https://api.cloudflare.com/client/v4/accounts/${{ secrets.CLOUDFLARE_ACCOUNT_ID }}/pages/projects/magnum" \
              -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
              -H "Content-Type: application/json" \
              -d "{\"canonical_deployment\":{\"id\":\"$DEPLOYMENT_ID\"}}"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
