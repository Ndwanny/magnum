# Supabase local development configuration
# https://supabase.com/docs/guides/local-development

project_id = "magnum-security"

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:8080"
additional_redirect_urls = ["https://portal.magnumsecurity.co.zm"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = false           # Admin creates users only — no self-registration
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = false
enable_confirmations = true
secure_password_change = true

[edge_runtime]
enabled = true

[functions.send-email]
verify_jwt = true

[functions.payment-webhook]
verify_jwt = false              # Webhook — authenticated via Lenco signature, not JWT
